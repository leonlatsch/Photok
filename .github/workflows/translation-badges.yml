name: Update Translation Badges

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-translation-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Update translation badges
        run: bundle exec fastlane translations
